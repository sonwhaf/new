<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessible Interactive Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #image {
            width: 600px;
            height: 400px;
            border: 2px solid black;
            margin: 20px auto;
            line-height: 400px;
            background-size: cover;
            background-position: center;
            color: white;
            font-size: 24px;
        }

        .preview {
            width: 150px;
            margin: 10px;
        }

        figure {
            display: inline-block;
        }
    </style>
</head>

<body onload="addTabIndex()">

<h1>My Interactive Photo Gallery</h1>

<div id="image">
    Hover over an image below to display here.
</div>

<figure>
    <img class="preview" src="https://picsum.photos/id/1015/300/200" 
        alt="Beautiful mountain landscape"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<figure>
    <img class="preview" src="https://picsum.photos/id/1025/300/200" 
        alt="Cute dog sitting on grass"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<figure>
    <img class="preview" src="https://picsum.photos/id/1035/300/200" 
        alt="Ocean waves at sunset"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<figure>
    <img class="preview" src="https://picsum.photos/id/1040/300/200" 
        alt="Forest path in autumn"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<figure>
    <img class="preview" src="https://picsum.photos/id/1050/300/200" 
        alt="City skyline at night"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<figure>
    <img class="preview" src="https://picsum.photos/id/1060/300/200" 
        alt="Snow covered mountains"
        onmouseover="upDate(this)"
        onmouseleave="undo()"
        onfocus="upDate(this)"
        onblur="undo()">
</figure>

<script>

function upDate(previewPic){
    console.log("Mouse over or focus triggered");

    let display = document.getElementById("image");

    display.style.backgroundImage = "url('" + previewPic.src + "')";
    display.innerHTML = previewPic.alt;
}

function undo(){
    console.log("Mouse leave or blur triggered");

    let display = document.getElementById("image");

    display.style.backgroundImage = "url('')";
    display.innerHTML = "Hover over an image below to display here.";
}

function addTabIndex(){
    console.log("Page loaded - adding tabindex");

    let images = document.querySelectorAll(".preview");

    for(let i = 0; i < images.length; i++){
        images[i].setAttribute("tabindex", "0");
    }
}

</script>

</body>
</html>
